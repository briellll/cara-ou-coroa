<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Kanit:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Manrope:wght@200..800&display=swap" rel="stylesheet">
    <title>Cara ou Coroa</title>
</head>
<body>

    <div class="container">
        <h1 class="title-container">
            Jogue a Moeda
        </h1>
        <p class="subtitle-container">
            Pressione a moeda ou o botão para girar a moeda
        </p>

        <button class="coin">
            <img class="coin-head" src="assets/images/heads.svg" alt="">
            <img class="coin-tails hide" src="assets/images/tails.svg" alt="">
            <img class="shadow-coin" src="assets/images/shadow.svg" alt="">
        </button>

        <p class="result">Cara</p>
        <button class="btn-default">Girar</button>
    </div>
    <script src="script.js"></script>

</body>
</html>
